<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>התחברות - DRVN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-top: max(24px, env(safe-area-inset-top));
        }

        .login-container {
            width: 100%;
            max-width: 380px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .logo-text {
            font-size: 42px;
            font-weight: 900;
            color: #f59e0b;
            letter-spacing: 6px;
        }

        .tagline {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 12px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #64748b;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        /* Form */
        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #64748b;
        }

        .input-field {
            width: 100%;
            padding: 16px 48px 16px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .input-field:focus {
            outline: none;
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.15);
        }

        /* Password toggle */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .input-field {
            padding-left: 48px;
        }

        .toggle-password {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #f59e0b;
        }

        /* Buttons */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
            transition: all 0.3s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(245, 158, 11, 0.5);
        }

        .submit-btn.register {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .submit-btn.register:hover {
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.5);
        }

        /* Links */
        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #f59e0b;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #fbbf24;
        }

        /* Messages */
        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #6ee7b7;
        }

        .message.warning {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
            color: #fcd34d;
        }

        /* Trial Info Box */
        .trial-info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .trial-info-title {
            color: #93c5fd;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .trial-info ul {
            color: #bfdbfe;
            font-size: 13px;
            list-style: none;
            padding: 0;
        }

        .trial-info li {
            margin-bottom: 4px;
        }

        /* Features */
        .features {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature-item {
            text-align: center;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .feature-text {
            color: #64748b;
            font-size: 11px;
        }

        /* Small label */
        .small-label {
            color: #64748b;
            font-size: 11px;
            margin-top: 6px;
        }

        /* Resend button */
        .resend-btn {
            width: 100%;
            padding: 12px;
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.4);
            border-radius: 10px;
            color: #fcd34d;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s;
        }

        .resend-btn:hover {
            background: rgba(245, 158, 11, 0.3);
        }

        .resend-btn:disabled {
            background: rgba(100, 116, 139, 0.2);
            border-color: rgba(100, 116, 139, 0.4);
            color: #64748b;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon">🏁</div>
            <div class="logo-text">DRVN</div>
            <p class="tagline">מערכת ניהול מוסך מקצועית</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">התחבר</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">הרשם</button>
        </div>

        <!-- Messages -->
        <div class="message" id="messageBox"></div>

        <!-- Login Form -->
        <form id="loginForm" class="form-container" onsubmit="handleLogin(event)">
            <div class="input-group">
                <span class="input-icon">📧</span>
                <input type="email" id="loginEmail" class="input-field" placeholder="אימייל" required>
            </div>

            <div class="input-group password-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="loginPassword" class="input-field" placeholder="סיסמה" required minlength="6">
                <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                    <span>👁️</span>
                </button>
            </div>

            <button type="submit" class="submit-btn">🚀 התחבר</button>

            <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">שכחת סיסמה?</a>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form-container hidden" onsubmit="handleRegister(event)">
            <div class="input-group">
                <span class="input-icon">📧</span>
                <input type="email" id="registerEmail" class="input-field" placeholder="אימייל" required>
                <p class="small-label">נשלח אליך קוד אימות לאימייל זה</p>
            </div>

            <div class="input-group password-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="registerPassword" class="input-field" placeholder="סיסמה (לפחות 6 תווים)" required minlength="6">
                <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">
                    <span>👁️</span>
                </button>
            </div>

            <div class="input-group password-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="registerPasswordConfirm" class="input-field" placeholder="אימות סיסמה" required minlength="6">
                <button type="button" class="toggle-password" onclick="togglePassword('registerPasswordConfirm', this)">
                    <span>👁️</span>
                </button>
            </div>

            <div class="trial-info">
                <p class="trial-info-title">💡 ההרשמה כוללת:</p>
                <ul>
                    <li>✅ 30 יום ניסיון חינם</li>
                    <li>✅ גישה מלאה לכל התכונות</li>
                    <li>✅ אימות אימייל נדרש</li>
                </ul>
            </div>

            <button type="submit" class="submit-btn register">🎉 הרשם עכשיו</button>
        </form>

        <!-- Features -->
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🚗</div>
                <div class="feature-text">ניהול רכבים</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📅</div>
                <div class="feature-text">יומן פגישות</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔔</div>
                <div class="feature-text">תזכורות</div>
            </div>
        </div>
    </div>

    <script>
        console.log('🚀 DRVN Login Page v4.0-NEW-DESIGN Loaded');

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCdSRfJCoU6xwDych3l_3K_hBZBHOi9jVg",
            authDomain: "garage-17263.firebaseapp.com",
            projectId: "garage-17263",
            storageBucket: "garage-17263.firebasestorage.app",
            messagingSenderId: "332265903935",
            appId: "1:332265903935:web:237c0787a161fd36a7a58a",
            measurementId: "G-KLLCPECCDQ"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Toggle Password Visibility
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('span');

            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // Show Message
        function showMessage(text, type = 'error') {
            const messageBox = document.getElementById('messageBox');
            messageBox.className = `message show ${type}`;
            messageBox.innerHTML = text;
        }

        // Hide Message
        function hideMessage() {
            const messageBox = document.getElementById('messageBox');
            messageBox.className = 'message';
        }

        // Switch Tabs
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            hideMessage();

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        // Forgot Password
        function showForgotPassword() {
            const email = prompt('הכנס את כתובת האימייל שלך לאיפוס סיסמה:');

            if (email && email.trim()) {
                auth.sendPasswordResetEmail(email.trim())
                    .then(() => {
                        showMessage('📧 נשלח אליך מייל לאיפוס הסיסמה. בדוק את תיבת הדואר שלך.', 'success');
                    })
                    .catch((error) => {
                        if (error.code === 'auth/user-not-found') {
                            showMessage('❌ לא נמצא משתמש עם אימייל זה', 'error');
                        } else if (error.code === 'auth/invalid-email') {
                            showMessage('❌ כתובת אימייל לא תקינה', 'error');
                        } else {
                            showMessage('❌ שגיאה: ' + error.message, 'error');
                        }
                    });
            }
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Check verification status
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();

                const isVerified = user.emailVerified || userData?.emailVerified === true;

                if (!isVerified) {
                    showMessage(`
                        <p><strong>⚠️ האימייל לא אומת!</strong></p>
                        <p style="margin-top: 8px; font-size: 13px;">אנא אמת את האימייל שלך לפני שתתחבר.</p>
                        <button onclick="resendVerificationEmail()" class="resend-btn" id="resendBtn">
                            📧 שלח אימות מחדש
                        </button>
                    `, 'warning');
                    return;
                }

                showMessage('✅ התחברת בהצלחה! מעביר אותך למערכת...', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                let errorMessage = 'שגיאה בהתחברות';

                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'המשתמש לא קיים. אנא הרשם תחילה.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'סיסמה שגויה. נסה שוב.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'אימייל לא תקין.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'יותר מדי ניסיונות. נסה שוב מאוחר יותר.';
                }

                showMessage('❌ ' + errorMessage, 'error');
            }
        }

        // Handle Register
        async function handleRegister(event) {
            event.preventDefault();

            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerPasswordConfirm').value;

            if (password !== confirmPassword) {
                showMessage('❌ הסיסמאות לא תואמות!', 'error');
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await user.sendEmailVerification();

                const trialEndDate = new Date();
                trialEndDate.setDate(trialEndDate.getDate() + 30);

                await db.collection('users').doc(user.uid).set({
                    userId: user.uid,
                    email: email,
                    subscriptionStatus: 'trial',
                    subscriptionEndDate: firebase.firestore.Timestamp.fromDate(trialEndDate),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    emailVerified: false,
                    onboardingCompleted: false
                });

                showMessage(`
                    <p><strong>✅ ההרשמה הצליחה!</strong></p>
                    <p style="margin-top: 8px; font-size: 13px;">📧 נשלח אליך מייל אימות לכתובת: <strong>${email}</strong></p>
                    <p style="margin-top: 8px; font-size: 13px;">אנא פתח את המייל ולחץ על קישור האימות.</p>
                `, 'success');

                await auth.signOut();

                document.getElementById('registerEmail').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('registerPasswordConfirm').value = '';

            } catch (error) {
                let errorMessage = 'שגיאה בהרשמה';

                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'האימייל כבר בשימוש. אנא התחבר או השתמש באימייל אחר.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'אימייל לא תקין.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'הסיסמה חלשה מדי. השתמש לפחות ב-6 תווים.';
                }

                showMessage('❌ ' + errorMessage, 'error');
            }
        }

        // Resend Verification Email
        let lastResendTime = 0;
        const RESEND_COOLDOWN = 30000;

        async function resendVerificationEmail() {
            const currentTime = Date.now();

            if (lastResendTime > 0 && (currentTime - lastResendTime) < RESEND_COOLDOWN) {
                const remaining = Math.ceil((RESEND_COOLDOWN - (currentTime - lastResendTime)) / 1000);
                alert(`⏱️ אנא המתן ${remaining} שניות`);
                return;
            }

            try {
                const user = auth.currentUser;
                if (user) {
                    await user.sendEmailVerification();
                    lastResendTime = Date.now();

                    showMessage('✅ נשלח מייל אימות חדש! בדוק את תיבת הדואר שלך.', 'success');

                    // Start countdown
                    const btn = document.getElementById('resendBtn');
                    if (btn) {
                        btn.disabled = true;
                        let remaining = 30;
                        const interval = setInterval(() => {
                            remaining--;
                            if (remaining > 0) {
                                btn.textContent = `⏱️ המתן ${remaining} שניות`;
                            } else {
                                clearInterval(interval);
                                btn.disabled = false;
                                btn.textContent = '📧 שלח אימות מחדש';
                            }
                        }, 1000);
                    }

                    setTimeout(() => auth.signOut(), 2000);
                }
            } catch (error) {
                if (error.code === 'auth/too-many-requests') {
                    alert('⏱️ יותר מדי בקשות. אנא המתן דקה ונסה שוב.');
                } else {
                    alert('❌ שגיאה: ' + error.message);
                }
            }
        }

        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user && user.emailVerified) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
