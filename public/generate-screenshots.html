<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRVN - App Store Screenshot Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; }

        .toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            background: #1a1a2e; padding: 10px 20px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            border-bottom: 2px solid #f59e0b;
        }
        .toolbar-title { font-weight: 800; color: #f59e0b; font-size: 15px; margin-left: 12px; }
        .btn {
            padding: 6px 12px; border-radius: 7px; border: 2px solid transparent;
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
            font-size: 12px; font-weight: 600;
        }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.25); color: #f59e0b; }
        .btn-dl {
            padding: 7px 18px; border-radius: 7px; border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706); color: black;
            cursor: pointer; font-size: 13px; font-weight: 700; margin-right: auto;
        }
        .btn-dl:hover { transform: scale(1.03); }
        .btn-dl-all {
            padding: 7px 18px; border-radius: 7px; border: 2px solid #f59e0b;
            background: transparent; color: #f59e0b; cursor: pointer;
            font-size: 13px; font-weight: 700;
        }
        .size-label { color: #9ca3af; font-size: 11px; }
        .canvas-area { margin-top: 60px; display: flex; justify-content: center; padding: 20px; }
        #screenshotFrame { overflow: hidden; position: relative; }
        .loading-overlay {
            display: none; position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.8); z-index: 99999;
            align-items: center; justify-content: center; flex-direction: column; gap: 16px;
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner { width:44px; height:44px; border:4px solid rgba(245,158,11,0.3); border-top-color:#f59e0b; border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-title">📱 DRVN Screenshots</span>
        <div style="display:flex; gap:5px;">
            <button class="btn active" onclick="setDevice('iphone67')" id="d-iphone67">iPhone 6.7"</button>
            <button class="btn" onclick="setDevice('iphone65')" id="d-iphone65">iPhone 6.5"</button>
            <button class="btn" onclick="setDevice('ipad')" id="d-ipad">iPad 12.9"</button>
            <button class="btn" onclick="setDevice('watch')" id="d-watch">Watch</button>
        </div>
        <div style="width:1px; height:22px; background:rgba(255,255,255,0.2);"></div>
        <div style="display:flex; gap:5px;" id="screenBtns">
            <button class="btn active" onclick="setScreen('calendar')" id="s-calendar">Calendar</button>
            <button class="btn" onclick="setScreen('cardetails')" id="s-cardetails">Car Details</button>
            <button class="btn" onclick="setScreen('backup')" id="s-backup">Backup</button>
            <button class="btn" onclick="setScreen('dashboard')" id="s-dashboard">Dashboard</button>
        </div>
        <span class="size-label" id="sizeLabel">1290 × 2796</span>
        <button class="btn-dl" onclick="downloadCurrent()">⬇️ Download PNG</button>
        <button class="btn-dl-all" onclick="downloadAll()">📦 Download All</button>
    </div>

    <div class="canvas-area"><div id="screenshotFrame"></div></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div style="color:#f59e0b; font-weight:600;">Generating...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
    var currentDevice = 'iphone67';
    var currentScreen = 'calendar';

    var devices = {
        iphone67: { w: 1290, h: 2796 },
        iphone65: { w: 1242, h: 2688 },
        ipad:     { w: 2048, h: 2732 },
        watch:    { w: 396,  h: 484  }
    };

    function setDevice(d) {
        currentDevice = d;
        document.querySelectorAll('[id^="d-"]').forEach(function(b){b.classList.remove('active')});
        document.getElementById('d-'+d).classList.add('active');
        var dev = devices[d];
        document.getElementById('sizeLabel').textContent = dev.w+' × '+dev.h;
        render();
    }
    function setScreen(s) {
        currentScreen = s;
        document.querySelectorAll('[id^="s-"]').forEach(function(b){b.classList.remove('active')});
        document.getElementById('s-'+s).classList.add('active');
        render();
    }

    function render() {
        var dev = devices[currentDevice];
        var frame = document.getElementById('screenshotFrame');
        frame.style.width = dev.w+'px';
        frame.style.height = dev.h+'px';
        frame.style.overflow = 'hidden';
        frame.style.borderRadius = currentDevice === 'watch' ? '80px' : '0';

        var isWatch = currentDevice === 'watch';
        var isIPad = currentDevice === 'ipad';
        var s = dev.w / 1290;

        var html = '';
        if (isWatch) {
            html = currentScreen === 'calendar' ? watchCalendar(dev) : watchHome(dev);
        } else if (isIPad) {
            html = ipadRender(s, dev);
        } else {
            html = phoneRender(s, dev);
        }
        frame.innerHTML = html;
    }

    // Helpers
    function P(base, s) { return Math.round(base * s) + 'px'; }
    function F(base, s) { return Math.round(base * s) + 'px'; }

    // ======================================
    // PHONE RENDERS - Matching real app
    // ======================================
    function phoneRender(s, dev) {
        if (currentScreen === 'calendar') return phoneCalendar(s, dev);
        if (currentScreen === 'cardetails') return phoneCarDetails(s, dev);
        if (currentScreen === 'backup') return phoneBackup(s, dev);
        if (currentScreen === 'dashboard') return phoneDashboard(s, dev);
        return phoneCalendar(s, dev);
    }

    // --- SCREEN 1: CALENDAR (matches real app) ---
    function phoneCalendar(s, dev) {
        var dayNames = ['ש','ו','ה','ד','ג','ב','א'];

        var dayH = '';
        for (var i = 0; i < dayNames.length; i++) {
            dayH += '<div style="text-align:center; font-size:'+F(28,s)+'; color:#6b7280; font-weight:600;">'+dayNames[i]+'</div>';
        }

        // Feb 2026 starts on Sunday (day index 0)
        var calCells = '';
        for (var d = 1; d <= 28; d++) {
            var isToday = d === 19;
            var hasEvt = [5,12,15,19,22,25].indexOf(d) >= 0;
            var cellBg = isToday ? 'background:#f59e0b; color:white; font-weight:700;' : 'color:#1f2937;';
            var dot = hasEvt && !isToday ? '<div style="width:'+P(10,s)+'; height:'+P(10,s)+'; background:#ef4444; border-radius:50%; margin:'+P(4,s)+' auto 0;"></div>' : '';
            calCells += '<div style="text-align:center; padding:'+P(16,s)+' 0; border-radius:'+P(14,s)+'; font-size:'+F(32,s)+'; '+cellBg+'">'+d+dot+'</div>';
        }

        return '<div style="width:100%; height:100%; display:flex; flex-direction:column; background:#f3f4f6; font-family:-apple-system,BlinkMacSystemFont,sans-serif; direction:rtl;">' +
            // Status bar
            '<div style="height:'+P(90,s)+'; background:linear-gradient(135deg,#f59e0b,#d97706);"></div>' +
            // Header
            '<div style="background:linear-gradient(135deg,#f59e0b,#d97706); padding:'+P(8,s)+' '+P(40,s)+' '+P(36,s)+';">' +
                '<div style="display:flex; justify-content:space-between; align-items:center;">' +
                    '<span style="font-size:'+F(44,s)+'; color:white;">☰</span>' +
                    '<span style="font-size:'+F(46,s)+'; font-weight:800; color:white; letter-spacing:2px;">DRVN</span>' +
                    '<div style="display:flex; gap:'+P(16,s)+';">' +
                        '<span style="font-size:'+F(40,s)+'; color:white;">🔔</span>' +
                        '<span style="font-size:'+F(40,s)+'; color:white;">🌙</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            // Calendar card
            '<div style="background:white; border-radius:'+P(24,s)+'; margin:'+P(20,s)+' '+P(32,s)+'; padding:'+P(28,s)+'; box-shadow:0 2px 12px rgba(0,0,0,0.06);">' +
                // Month nav
                '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:'+P(20,s)+';">' +
                    '<div style="width:'+P(72,s)+'; height:'+P(72,s)+'; background:#f3f4f6; border-radius:'+P(14,s)+'; display:flex; align-items:center; justify-content:center; font-size:'+F(32,s)+'; color:#6b7280;">→</div>' +
                    '<span style="font-size:'+F(36,s)+'; font-weight:700; color:#1f2937;">פברואר 2026</span>' +
                    '<div style="width:'+P(72,s)+'; height:'+P(72,s)+'; background:#f3f4f6; border-radius:'+P(14,s)+'; display:flex; align-items:center; justify-content:center; font-size:'+F(32,s)+'; color:#6b7280;">←</div>' +
                '</div>' +
                // Day headers
                '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:'+P(4,s)+'; margin-bottom:'+P(8,s)+';">' + dayH + '</div>' +
                // Days grid
                '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:'+P(4,s)+';">' + calCells + '</div>' +
            '</div>' +

            // Section title
            '<div style="padding:'+P(16,s)+' '+P(40,s)+' '+P(8,s)+';">' +
                '<span style="font-size:'+F(34,s)+'; font-weight:700; color:#1f2937;">📋 פגישות היום</span>' +
            '</div>' +

            // Appointment cards
            aptCardReal(s, '09:00', 'טויוטה קורולה', 'החלפת שמן ופילטר', '12-345-67', '#f59e0b', '#fef3c7') +
            aptCardReal(s, '11:30', 'הונדה סיוויק', 'בדיקת בלמים', '98-765-43', '#3b82f6', '#dbeafe') +
            aptCardReal(s, '14:00', 'מאזדה 3', 'טיפול 30,000 ק"מ', '55-123-88', '#10b981', '#dcfce7') +
            aptCardReal(s, '16:00', 'סקודה אוקטביה', 'החלפת צמיגים', '33-222-11', '#8b5cf6', '#ede9fe') +

            // Bottom nav
            bottomNav(s, 'calendar') +
        '</div>';
    }

    function aptCardReal(s, time, car, desc, plate, accentColor, bgColor) {
        return '<div style="background:white; border-radius:'+P(20,s)+'; padding:'+P(22,s)+' '+P(26,s)+'; margin:'+P(8,s)+' '+P(32,s)+'; box-shadow:0 1px 6px rgba(0,0,0,0.05); display:flex; align-items:center; gap:'+P(18,s)+'; direction:rtl; border-right:'+P(8,s)+' solid '+accentColor+';">' +
            '<div style="background:'+bgColor+'; color:'+accentColor+'; padding:'+P(12,s)+' '+P(18,s)+'; border-radius:'+P(12,s)+'; font-weight:800; font-size:'+F(28,s)+'; white-space:nowrap;">'+time+'</div>' +
            '<div style="flex:1;">' +
                '<div style="font-size:'+F(28,s)+'; font-weight:700; color:#1f2937;">'+car+'</div>' +
                '<div style="font-size:'+F(24,s)+'; color:#6b7280; margin-top:'+P(4,s)+';">'+desc+'</div>' +
                '<div style="font-size:'+F(22,s)+'; color:#9ca3af; margin-top:'+P(2,s)+';">'+plate+'</div>' +
            '</div>' +
            '<div style="font-size:'+F(32,s)+'; color:#d1d5db;">←</div>' +
        '</div>';
    }

    // --- SCREEN 2: CAR DETAILS (matches real app) ---
    function phoneCarDetails(s, dev) {
        return '<div style="width:100%; height:100%; display:flex; flex-direction:column; background:#f3f4f6; font-family:-apple-system,BlinkMacSystemFont,sans-serif; direction:rtl;">' +
            // Status bar
            '<div style="height:'+P(90,s)+'; background:linear-gradient(135deg,#f59e0b,#d97706);"></div>' +
            // Header
            '<div style="background:linear-gradient(135deg,#f59e0b,#d97706); padding:'+P(8,s)+' '+P(40,s)+' '+P(36,s)+';">' +
                '<div style="display:flex; justify-content:space-between; align-items:center;">' +
                    '<span style="font-size:'+F(44,s)+'; color:white;">←</span>' +
                    '<span style="font-size:'+F(42,s)+'; font-weight:800; color:white;">פרטי רכב</span>' +
                    '<span style="font-size:'+F(40,s)+'; color:white;">✏️</span>' +
                '</div>' +
            '</div>' +

            // Car image placeholder
            '<div style="margin:'+P(20,s)+' '+P(32,s)+' 0; height:'+P(480,s)+'; background:linear-gradient(135deg,#e5e7eb,#d1d5db); border-radius:'+P(24,s)+'; display:flex; align-items:center; justify-content:center; overflow:hidden;">' +
                '<div style="text-align:center;">' +
                    '<div style="font-size:'+F(120,s)+'; margin-bottom:'+P(12,s)+';">🚗</div>' +
                    '<div style="font-size:'+F(28,s)+'; color:#6b7280;">תמונת הרכב</div>' +
                '</div>' +
            '</div>' +

            // Car info card
            '<div style="background:white; border-radius:'+P(24,s)+'; margin:'+P(16,s)+' '+P(32,s)+'; padding:'+P(28,s)+'; box-shadow:0 2px 12px rgba(0,0,0,0.06);">' +
                // Plate + Status
                '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:'+P(18,s)+';">' +
                    '<div style="background:#fef3c7; padding:'+P(10,s)+' '+P(24,s)+'; border-radius:'+P(12,s)+';">' +
                        '<span style="font-weight:800; font-size:'+F(36,s)+'; color:#92400e; letter-spacing:2px;">12-345-67</span>' +
                    '</div>' +
                    '<div style="background:#dbeafe; padding:'+P(8,s)+' '+P(18,s)+'; border-radius:'+P(20,s)+';">' +
                        '<span style="font-size:'+F(24,s)+'; font-weight:600; color:#1e40af;">🔵 בטיפול</span>' +
                    '</div>' +
                '</div>' +
                // Details grid
                '<div style="display:grid; grid-template-columns:1fr 1fr; gap:'+P(16,s)+';">' +
                    detailItem(s, '👤', 'בעלים', 'יוסף כהן') +
                    detailItem(s, '🚗', 'רכב', 'טויוטה קורולה') +
                    detailItem(s, '📅', 'שנה', '2022') +
                    detailItem(s, '🎨', 'צבע', 'לבן') +
                    detailItem(s, '📞', 'טלפון', '050-1234567') +
                    detailItem(s, '🔧', 'ק"מ', '45,230') +
                '</div>' +
            '</div>' +

            // Action buttons
            '<div style="padding:'+P(8,s)+' '+P(32,s)+'; display:flex; flex-direction:column; gap:'+P(14,s)+';">' +
                actionBtn(s, '+ הוסף טיפול', '#10b981', '#065f46', '🔧') +
                actionBtn(s, 'שלח WhatsApp', '#22c55e', '#065f46', '📱') +
                '<div style="display:flex; gap:'+P(14,s)+';">' +
                    halfBtn(s, 'הדפס דו"ח', '#6b7280', '#e5e7eb', '#374151', '🖨️') +
                    halfBtn(s, 'שתף', '#8b5cf6', '#ede9fe', '#5b21b6', '🔗') +
                '</div>' +
            '</div>' +

            // Maintenance history title
            '<div style="padding:'+P(20,s)+' '+P(40,s)+' '+P(8,s)+';">' +
                '<span style="font-size:'+F(34,s)+'; font-weight:700; color:#1f2937;">📋 היסטוריית טיפולים</span>' +
            '</div>' +

            // Maintenance cards
            maintenanceCard(s, '15/01/2026', 'החלפת שמן', '₪350', '#10b981') +
            maintenanceCard(s, '20/11/2025', 'בדיקת בלמים', '₪180', '#3b82f6') +
            maintenanceCard(s, '05/08/2025', 'טיפול 30,000', '₪1,200', '#f59e0b') +

            // Bottom nav
            bottomNav(s, 'cars') +
        '</div>';
    }

    function detailItem(s, icon, label, value) {
        return '<div style="background:#f9fafb; border-radius:'+P(14,s)+'; padding:'+P(16,s)+';">' +
            '<div style="font-size:'+F(22,s)+'; color:#9ca3af; margin-bottom:'+P(4,s)+';">'+icon+' '+label+'</div>' +
            '<div style="font-size:'+F(28,s)+'; font-weight:600; color:#1f2937;">'+value+'</div>' +
        '</div>';
    }

    function actionBtn(s, text, bgColor, textColor, icon) {
        return '<div style="background:'+bgColor+'; border-radius:'+P(18,s)+'; padding:'+P(26,s)+'; text-align:center; box-shadow:0 4px 15px '+bgColor+'40;">' +
            '<span style="font-size:'+F(32,s)+'; font-weight:700; color:white;">'+icon+' '+text+'</span>' +
        '</div>';
    }

    function halfBtn(s, text, iconColor, bgColor, textColor, icon) {
        return '<div style="flex:1; background:'+bgColor+'; border-radius:'+P(18,s)+'; padding:'+P(22,s)+'; text-align:center;">' +
            '<span style="font-size:'+F(28,s)+'; font-weight:600; color:'+textColor+';">'+icon+' '+text+'</span>' +
        '</div>';
    }

    function maintenanceCard(s, date, desc, price, color) {
        return '<div style="background:white; border-radius:'+P(18,s)+'; padding:'+P(22,s)+' '+P(26,s)+'; margin:'+P(8,s)+' '+P(32,s)+'; box-shadow:0 1px 6px rgba(0,0,0,0.04); display:flex; justify-content:space-between; align-items:center; border-right:'+P(6,s)+' solid '+color+';">' +
            '<div>' +
                '<div style="font-size:'+F(28,s)+'; font-weight:600; color:#1f2937;">'+desc+'</div>' +
                '<div style="font-size:'+F(22,s)+'; color:#9ca3af; margin-top:'+P(4,s)+';">'+date+'</div>' +
            '</div>' +
            '<div style="background:#f0fdf4; padding:'+P(8,s)+' '+P(18,s)+'; border-radius:'+P(10,s)+';">' +
                '<span style="font-size:'+F(28,s)+'; font-weight:700; color:'+color+';">'+price+'</span>' +
            '</div>' +
        '</div>';
    }

    // --- SCREEN 3: BACKUP (matches real app - colorful gradient buttons) ---
    function phoneBackup(s, dev) {
        return '<div style="width:100%; height:100%; display:flex; flex-direction:column; background:#f3f4f6; font-family:-apple-system,BlinkMacSystemFont,sans-serif; direction:rtl;">' +
            '<div style="height:'+P(90,s)+'; background:linear-gradient(135deg,#f59e0b,#d97706);"></div>' +
            '<div style="background:linear-gradient(135deg,#f59e0b,#d97706); padding:'+P(8,s)+' '+P(40,s)+' '+P(36,s)+';">' +
                '<div style="display:flex; justify-content:space-between; align-items:center;">' +
                    '<span style="font-size:'+F(44,s)+'; color:white;">☰</span>' +
                    '<span style="font-size:'+F(42,s)+'; font-weight:800; color:white;">גיבוי ושחזור</span>' +
                    '<span></span>' +
                '</div>' +
            '</div>' +

            // Info card
            '<div style="background:white; border-radius:'+P(24,s)+'; margin:'+P(20,s)+' '+P(32,s)+'; padding:'+P(28,s)+'; box-shadow:0 2px 12px rgba(0,0,0,0.06);">' +
                '<div style="display:flex; align-items:center; gap:'+P(16,s)+'; margin-bottom:'+P(16,s)+';">' +
                    '<div style="font-size:'+F(48,s)+';">💾</div>' +
                    '<div>' +
                        '<div style="font-size:'+F(30,s)+'; font-weight:700; color:#1f2937;">גיבוי אחרון</div>' +
                        '<div style="font-size:'+F(24,s)+'; color:#6b7280;">19/02/2026, 14:30</div>' +
                    '</div>' +
                '</div>' +
                '<div style="display:flex; gap:'+P(12,s)+';">' +
                    '<div style="flex:1; background:#dcfce7; border-radius:'+P(12,s)+'; padding:'+P(14,s)+'; text-align:center;">' +
                        '<div style="font-size:'+F(36,s)+'; font-weight:800; color:#166534;">12</div>' +
                        '<div style="font-size:'+F(20,s)+'; color:#166534;">רכבים</div>' +
                    '</div>' +
                    '<div style="flex:1; background:#dbeafe; border-radius:'+P(12,s)+'; padding:'+P(14,s)+'; text-align:center;">' +
                        '<div style="font-size:'+F(36,s)+'; font-weight:800; color:#1e40af;">28</div>' +
                        '<div style="font-size:'+F(20,s)+'; color:#1e40af;">טיפולים</div>' +
                    '</div>' +
                    '<div style="flex:1; background:#fef3c7; border-radius:'+P(12,s)+'; padding:'+P(14,s)+'; text-align:center;">' +
                        '<div style="font-size:'+F(36,s)+'; font-weight:800; color:#92400e;">8</div>' +
                        '<div style="font-size:'+F(20,s)+'; color:#92400e;">תורים</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            // Big action buttons - matching real app gradient style
            '<div style="padding:'+P(8,s)+' '+P(32,s)+'; display:flex; flex-direction:column; gap:'+P(18,s)+';">' +

                backupBtn(s, '☁️', 'גיבוי לענן', 'שמור את כל הנתונים בענן', 'linear-gradient(135deg, #10b981, #059669)', '#d1fae5') +
                backupBtn(s, '📥', 'שחזור מענן', 'שחזר נתונים מגיבוי קודם', 'linear-gradient(135deg, #3b82f6, #2563eb)', '#dbeafe') +
                backupBtn(s, '📁', 'גיבוי עם תמונות', 'גיבוי כולל תמונות הרכבים', 'linear-gradient(135deg, #8b5cf6, #7c3aed)', '#ede9fe') +
                backupBtn(s, '📄', 'ייצוא CSV', 'ייצא נתונים לאקסל', 'linear-gradient(135deg, #f59e0b, #d97706)', '#fef3c7') +

            '</div>' +

            // Auto backup section

    // ======================================
    // DOWNLOAD
    // ======================================
    function downloadCurrent() {
        var loading = document.getElementById('loadingOverlay');
        loading.classList.add('show');
        var frame = document.getElementById('screenshotFrame');
        var dev = devices[currentDevice];
        html2canvas(frame, { width:dev.w, height:dev.h, scale:1, useCORS:true, backgroundColor:currentDevice==='watch'?'#0d0d1a':'#f3f4f6' }).then(function(canvas) {
            var link = document.createElement('a');
            link.download = 'DRVN-'+currentDevice+'-'+currentScreen+'-'+dev.w+'x'+dev.h+'.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            loading.classList.remove('show');
        }).catch(function(err) { alert('Error: '+err.message); loading.classList.remove('show'); });
    }

    function downloadAll() {
        var loading = document.getElementById('loadingOverlay');
        loading.classList.add('show');
        var allTasks = [];
        var dks = ['iphone67','iphone65','ipad','watch'];
        var allScr = {iphone67:['calendar','cardetails','backup','dashboard'], iphone65:['calendar','cardetails','backup','dashboard'], ipad:['calendar','cardetails','backup','dashboard'], watch:['calendar','cardetails']};
        for(var di=0;di<dks.length;di++){var dk=dks[di];var ss=allScr[dk];for(var si=0;si<ss.length;si++){allTasks.push({device:dk,screen:ss[si]});}}
        var savedDev = currentDevice, savedScr = currentScreen;
        var idx=0;
        function next(){
            if(idx>=allTasks.length){loading.classList.remove('show');alert('Done! '+allTasks.length+' screenshots downloaded.');currentDevice=savedDev;currentScreen=savedScr;render();return;}
            var t=allTasks[idx]; currentDevice=t.device; currentScreen=t.screen; render();
            setTimeout(function(){
                var frame=document.getElementById('screenshotFrame'); var dev=devices[t.device];
                html2canvas(frame,{width:dev.w,height:dev.h,scale:1,useCORS:true,backgroundColor:t.device==='watch'?'#0d0d1a':'#f3f4f6'}).then(function(canvas){
                    var link=document.createElement('a');link.download='DRVN-'+t.device+'-'+t.screen+'-'+dev.w+'x'+dev.h+'.png';link.href=canvas.toDataURL('image/png');link.click();idx++;setTimeout(next,500);
                }).catch(function(){idx++;setTimeout(next,500);});
            },300);
        }
        next();
    }

    render();
